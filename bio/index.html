  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    
    :root {
      --primary: #FACC15;
      --bg: #0A0A0A;
      --surface: #141414;
      --text: #FAFAFA;
      --text-muted: #A1A1AA;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }
    
    .font-display { 
      font-family: 'Poppins', sans-serif;
      letter-spacing: -0.015em;
    }
    
    html { scroll-behavior: smooth; }
    
    .glow-yellow {
      box-shadow: 0 0 60px rgba(250, 204, 21, 0.3), 0 0 100px rgba(250, 204, 21, 0.1);
    }
    
    .glow-subtle {
      box-shadow: 0 0 40px rgba(250, 204, 21, 0.15);
    }
    
    .text-glow {
      text-shadow: 0 0 40px rgba(250, 204, 21, 0.5);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #FACC15 0%, #FDE68A 50%, #FACC15 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .noise-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    
    .grid-pattern {
      background-image: 
        linear-gradient(rgba(250, 204, 21, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(250, 204, 21, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(250, 204, 21, 0.3); }
      50% { box-shadow: 0 0 80px rgba(250, 204, 21, 0.5); }
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .animate-float { animation: float 6s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
    .animate-fade-in { animation: fade-in 1s ease-out forwards; }
    .animate-scale-in { animation: scale-in 0.6s ease-out forwards; }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    
    .card-hover {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(250, 204, 21, 0.1);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #FACC15 0%, #EAB308 100%);
      color: #0A0A0A;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: none;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    
    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(250, 204, 21, 0.5);
    }
    
    .btn-secondary {
      border: 2px solid rgba(250, 204, 21, 0.3);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    
    .btn-secondary:hover {
      border-color: #FACC15;
      background: rgba(250, 204, 21, 0.1);
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
    
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(250, 204, 21, 0.3);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(250, 204, 21, 0.5);
    }
    
    .faq-item {
      border-bottom: 1px solid rgba(250, 204, 21, 0.1);
    }
    
    .faq-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
    }
    
    .faq-item.active .faq-content {
      max-height: 500px;
    }
    
    .faq-icon {
      transition: transform 0.3s ease;
    }
    
    .faq-item.active .faq-icon {
      transform: rotate(45deg);
    }

    .testimonial-card {
      background: linear-gradient(135deg, rgba(20, 20, 20, 0.8) 0%, rgba(30, 30, 30, 0.6) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(250, 204, 21, 0.1);
    }
    
    .plan-featured {
      background: linear-gradient(135deg, rgba(250, 204, 21, 0.1) 0%, rgba(20, 20, 20, 0.9) 100%);
      border: 2px solid rgba(250, 204, 21, 0.5);
    }
    
    .header-scrolled {
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    /* Carousel styles */
    .carousel-container {
      overflow: hidden;
      position: relative;
    }

    .carousel-wrapper {
      display: flex;
      transition: transform 0.5s ease-out;
    }

    .carousel-item {
      min-width: 100%;
      padding: 0 12px;
    }

    @media (min-width: 768px) {
      .carousel-item {
        min-width: calc(50% - 12px);
      }
    }

    @media (min-width: 1024px) {
      .carousel-item {
        min-width: calc(33.333% - 12px);
      }
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    .carousel-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(250, 204, 21, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      padding: 0;
    }

    .carousel-dot.active {
      background: #FACC15;
      width: 28px;
      border-radius: 5px;
    }

    .carousel-dot:hover {
      background: rgba(250, 204, 21, 0.5);
    }
  </style>
